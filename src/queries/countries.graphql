query GetCountries {
  countries {
    code
    name
    emoji
    native
    capital
    currency
    phone
    continent {
      code
      name
    }
  }
}

query GetCountry($code: ID!) {
  country(code: $code) {
    code
    name
    emoji
    native
    capital
    currency
    phone
    continent {
      code
      name
    }
    languages {
      code
      name
      native
    }
    states {
      code
      name
    }
  }
}

query GetContinents {
  continents {
    code
    name
  }
}
