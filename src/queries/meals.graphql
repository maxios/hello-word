query GetMeals($limit: Int, $page: Int) {
  Meals(limit: $limit, page: $page) {
    docs {
      id
      name
      calories
      carbs
      fat
      protein
      cook_time
      prep_time
      gluten_free
      lactose_free
      nut_free
      is_quick_meal
      image {
        url
        alt
        width
        height
      }
      categories {
        id
        name
      }
      diet_types {
        id
        name
      }
      createdAt
      updatedAt
    }
    hasNextPage
    hasPrevPage
    nextPage
    page
    prevPage
    totalDocs
    totalPages
  }
}

query GetMeal($id: String!) {
  Meal(id: $id) {
    id
    name
    calories
    carbs
    fat
    protein
    cook_time
    prep_time
    gluten_free
    lactose_free
    nut_free
    is_quick_meal
    image {
      url
      alt
      width
      height
    }
    categories {
      id
      name
    }
    diet_types {
      id
      name
    }
    ingredients {
      ... on IngredientBlock {
        id
        blockName
        blockType
        name
        amount
        serving_unit
      }
    }
    method {
      ... on MealMethodBlock {
        id
        blockName
        blockType
        step
      }
    }
    createdAt
    updatedAt
  }
}